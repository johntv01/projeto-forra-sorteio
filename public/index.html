<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Sorteio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px 35px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .card h1 {
      color: #fff;
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .card .subtitle {
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      font-size: 0.95rem;
      margin-bottom: 30px;
    }

    .counter {
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 25px;
      color: #a78bfa;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .counter span {
      font-size: 1.4rem;
      color: #c4b5fd;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.9rem;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      transition: border-color 0.3s, box-shadow 0.3s;
      outline: none;
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .form-group input:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 8px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .msg {
      text-align: center;
      padding: 12px;
      border-radius: 10px;
      margin-top: 16px;
      font-size: 0.9rem;
      display: none;
    }

    .msg.sucesso {
      display: block;
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .msg.erro {
      display: block;
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .lista-section {
      margin-top: 20px;
    }

    .lista-section h2 {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.1rem;
      margin-bottom: 12px;
      text-align: center;
    }

    .lista {
      max-height: 250px;
      overflow-y: auto;
      border-radius: 10px;
    }

    .lista::-webkit-scrollbar {
      width: 6px;
    }

    .lista::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    .lista::-webkit-scrollbar-thumb {
      background: rgba(167, 139, 250, 0.4);
      border-radius: 3px;
    }

    .participante {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      margin-bottom: 6px;
      transition: background 0.2s;
    }

    .participante:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .participante .numero {
      background: rgba(167, 139, 250, 0.2);
      color: #c4b5fd;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 600;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .participante .nome {
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.9rem;
    }

    .vazio {
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.9rem;
      padding: 20px;
    }

    .upload-area {
      position: relative;
      border: 2px dashed rgba(167, 139, 250, 0.3);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
      background: rgba(255, 255, 255, 0.04);
    }

    .upload-area:hover,
    .upload-area.dragover {
      border-color: #a78bfa;
      background: rgba(167, 139, 250, 0.08);
    }

    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
    }

    .upload-icon {
      font-size: 2rem;
    }

    .upload-hint {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
    }

    .preview-img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
      object-fit: contain;
    }

    .participante-img {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      object-fit: cover;
      margin-left: auto;
      flex-shrink: 0;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: transform 0.2s;
    }

    .participante-img:hover {
      transform: scale(1.1);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .modal-overlay.ativo {
      display: flex;
    }

    .modal-overlay img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 12px;
      object-fit: contain;
    }

    @media (max-width: 480px) {
      .card {
        padding: 28px 20px;
      }
      .card h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Sorteio</h1>
      <p class="subtitle">Cadastre-se para participar</p>

      <div class="counter">
        Participantes cadastrados: <span id="total">0</span>
      </div>

      <form id="form-cadastro">
        <div class="form-group">
          <label for="nome_completo">Nome completo</label>
          <input type="text" id="nome_completo" placeholder="Seu nome e sobrenome" required minlength="4">
        </div>

        <div class="form-group">
          <label for="whatsapp">WhatsApp</label>
          <input type="tel" id="whatsapp" placeholder="(00) 00000-0000" required minlength="10">
        </div>

        <div class="form-group">
          <label for="palavra_chave">Palavra-chave</label>
          <input type="text" id="palavra_chave" placeholder="Digite a palavra-chave da live" required minlength="3">
        </div>

        <div class="form-group">
          <label for="print">Print do cadastro na plataforma</label>
          <div class="upload-area" id="upload-area">
            <input type="file" id="print" accept="image/*" required>
            <div class="upload-placeholder" id="upload-placeholder">
              <span class="upload-icon">&#128247;</span>
              <span>Clique ou arraste o print aqui</span>
              <span class="upload-hint">JPG, PNG ou GIF (max. 5MB)</span>
            </div>
            <img id="preview-img" class="preview-img" style="display:none;" alt="Preview">
          </div>
        </div>

        <button type="submit" class="btn" id="btn-enviar">Participar do Sorteio</button>
      </form>

      <div id="mensagem" class="msg"></div>

      <div class="lista-section">
        <h2>Participantes</h2>
        <div class="lista" id="lista-participantes">
          <p class="vazio">Nenhum participante ainda.</p>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <img id="modal-img" src="" alt="Print">
  </div>

  <script>
    const form = document.getElementById('form-cadastro');
    const mensagem = document.getElementById('mensagem');
    const totalEl = document.getElementById('total');
    const listaEl = document.getElementById('lista-participantes');
    const btnEnviar = document.getElementById('btn-enviar');
    const printInput = document.getElementById('print');
    const uploadArea = document.getElementById('upload-area');
    const uploadPlaceholder = document.getElementById('upload-placeholder');
    const previewImg = document.getElementById('preview-img');
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modal-img');

    const whatsappInput = document.getElementById('whatsapp');
    whatsappInput.addEventListener('input', () => {
      let v = whatsappInput.value.replace(/\D/g, '');
      if (v.length > 11) v = v.slice(0, 11);
      if (v.length > 6) v = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
      else if (v.length > 2) v = `(${v.slice(0,2)}) ${v.slice(2)}`;
      else if (v.length > 0) v = `(${v}`;
      whatsappInput.value = v;
    });

    printInput.addEventListener('change', () => {
      const file = printInput.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          previewImg.src = e.target.result;
          previewImg.style.display = 'block';
          uploadPlaceholder.style.display = 'none';
        };
        reader.readAsDataURL(file);
      }
    });

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files.length) {
        printInput.files = e.dataTransfer.files;
        printInput.dispatchEvent(new Event('change'));
      }
    });

    modal.addEventListener('click', () => {
      modal.classList.remove('ativo');
    });

    function abrirModal(src) {
      modalImg.src = src;
      modal.classList.add('ativo');
    }

    async function carregarParticipantes() {
      try {
        const res = await fetch('/api/participantes');
        const data = await res.json();
        totalEl.textContent = data.total;
        renderizarLista(data.participantes);
      } catch {}
    }

    function renderizarLista(participantes) {
      if (participantes.length === 0) {
        listaEl.innerHTML = '<p class="vazio">Nenhum participante ainda.</p>';
        return;
      }

      listaEl.innerHTML = participantes
        .map((p, i) =>
          `<div class="participante">
            <div class="numero">${participantes.length - i}</div>
            <div class="nome">${escapeHtml(p.nome_completo)}</div>
            <img class="participante-img" src="/uploads/${escapeHtml(p.print_path)}" onclick="abrirModal(this.src)" alt="Print">
          </div>`
        )
        .join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function mostrarMensagem(texto, tipo) {
      mensagem.textContent = texto;
      mensagem.className = `msg ${tipo}`;
      setTimeout(() => {
        mensagem.className = 'msg';
      }, 4000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btnEnviar.disabled = true;
      btnEnviar.textContent = 'Enviando...';

      const formData = new FormData();
      formData.append('nome_completo', document.getElementById('nome_completo').value);
      formData.append('whatsapp', document.getElementById('whatsapp').value);
      formData.append('palavra_chave', document.getElementById('palavra_chave').value);
      formData.append('print', printInput.files[0]);

      try {
        const res = await fetch('/api/participantes', {
          method: 'POST',
          body: formData
        });

        const data = await res.json();

        if (res.ok) {
          mostrarMensagem('Cadastro realizado com sucesso!', 'sucesso');
          totalEl.textContent = data.total;
          form.reset();
          previewImg.style.display = 'none';
          uploadPlaceholder.style.display = 'flex';
          carregarParticipantes();
        } else {
          mostrarMensagem(data.erro, 'erro');
        }
      } catch {
        mostrarMensagem('Erro de conexão. Tente novamente.', 'erro');
      } finally {
        btnEnviar.disabled = false;
        btnEnviar.textContent = 'Participar do Sorteio';
      }
    });

    carregarParticipantes();
  </script>
</body>
</html>
